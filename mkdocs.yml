site_name: 2-Week GenAI & LLM Engineering Crash Training
site_author: Nikhil Sharma
site_description: A focused, hands-on GenAI and LLM engineering course — from transformers to production-ready agents.
site_url: https://llm.learnwithnickk.com/

repo_name: KirkYagami/2-Week-GenAI-LLM-Engineering-Crash-Training
repo_url: https://github.com/KirkYagami/2-Week-GenAI-LLM-Engineering-Crash-Training

copyright: Made with ❤️ by <a href="https://www.linkedin.com/in/-nikhil/" target="_blank">Nikhil Sharma</a>


theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.instant
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - roamlinks
  - callouts

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - md_in_html

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/-nikhil/
      name: Nikhil Sharma on LinkedIn
    - icon: fontawesome/brands/github
      link: https://github.com/KirkYagami
      name: KirkYagami on GitHub
    - icon: fontawesome/solid/envelope
      link: mailto:er.nikhilsharma7@gmail.com
      name: Email Nikhil

